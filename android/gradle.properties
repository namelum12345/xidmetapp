# Ehtiyat: ~7–8 GiB RAM olan maşınlarda 8G heap OOM ilə daemon "itir".
# Lazım olsa tədricən artırın: -Xmx2g → -Xmx3g (başqa tətbiqləri bağlayın).
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=192m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m
org.gradle.parallel=false
org.gradle.workers.max=2

android.useAndroidX=true
